version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
      - ./credentials.json:/app/credentials.json
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  pipeline:
    build: ./pipeline
    env_file: .env
    volumes:
      - ./pipeline:/app
      - ./credentials.json:/app/credentials.json
    command: python fetch_data.py

  ml:
    build: ./ml
    env_file: .env
    volumes:
      - ./ml:/app
      - ./credentials.json:/app/credentials.json
    command: python train_model.py

  scheduler:
    build: ./ml
    env_file: .env
    volumes:
      - .:/app
      - ./credentials.json:/app/credentials.json
    command: python automation/scheduler.py
